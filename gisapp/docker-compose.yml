services:
  gis-db:
    image: postgis/postgis:16-3.4
    container_name: gis_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: gis_db
    ports:
      - "5432:5432"
    volumes:
      - gis_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@geo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - gis-db

volumes:
  gis_data: